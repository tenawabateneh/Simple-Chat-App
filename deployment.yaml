apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-chat-app
  labels:
    app: simple-chat-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simple-chat-app
  template:
    metadata:
      labels:
        app: simple-chat-app
    spec:
      containers:
        - name: simple-chat-app
          image: tenaw/simple-chat-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: simple-chat-service
  labels:
    app: simple-chat-app
spec:
  type: NodePort
  selector:
    app: simple-chat-app
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30080
